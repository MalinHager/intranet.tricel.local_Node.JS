<script language="JavaScript" src="/scripts/MD5.js"></script>


<script language="JavaScript">
    let keys = {t:false, r:false};

    document.addEventListener("keydown", event =>
    {
	    if(event.key =="t")
	    {
                keys.t = true;
	    }
        if(event.key =="r")
	    {
                keys.r = true;
	    }
        if(keys.t && keys.r)
	    {
               document.getElementById("loginLayer").style.display = "block";
	    }
    });
        document.addEventListener("keyup", event =>
    {
	    if(event.key =="t")
	    {
              keys.t = false;
	    }
        if(event.key =="r")
	    {
              keys.r = false;
	    }
    	
    });
            document.addEventListener("keydown", event =>
    {
	    if(event.key =="Escape")
	    {
               document.getElementById("loginLayer").style.display = "none";
	    }
    	
    });

    function hashing()
{
	document.loginform.password.value = hex_md5(document.loginform.password.value);
}

function loginFormCheck()
{
	if(document.loginform.employeecode.value=="" || document.loginform.employeecode.value.indexOf("-")==-1)
	{
		alert("You must give a valid Employee Code!");
		return false;
	}
	if(document.loginform.password.value=="")
	{
		alert("You must give a Password!");
		return false;
	}
}
function changepasswordFormCheck()
{
	if(document.changepasswordform.employeecode.value=="" || document.changepasswordform.employeecode.value.indexOf("-")==-1)
	{
		alert("You must give a valid Employee Code!");
		return false;
	}
	if(document.changepasswordform.password.value=="")
	{
		alert("You must give a Password!");
		return false;
	}
	if(document.changepasswordform.newpassword.value=="")
	{
		alert("You must give a NEW Password!");
		return false;
	}
}

function changepasswordhashing()
{
	document.changepasswordform.password.value = hex_md5(document.changepasswordform.password.value);
	document.changepasswordform.newpassword.value = hex_md5(document.changepasswordform.newpassword.value);

}
</script>

<!-- GEMENSAMMA FILER -->

<body onload="loadChat()">
<div id="loginLayer">
	<h1>Login to Tricell</h1>
	<form name="loginform" action="http://localhost:3000/api/login" onSubmit="return loginFormCheck()" method="get">
	Employee Code: <input type="text" name="employeecode" id="employeecode" size="7" maxlength="7" />
	<p />
	Password: <input type="password" name="password" id="password" size="7" maxlength="255" />
	<p />
	<input type="submit" value="Login" onClick="hashing()" /><input type="reset" value="Reset" />
	</form>
	<h1>Change password</h1>
	<form name="changepasswordform" action="http://localhost:3000/api/login" onSubmit="return changepasswordform()" method="post">
	Employee Code: <input type="text" name="employeecode" id="employeecode" size="7" maxlength="7" />
	<p />
	Password: <input type="password" name="password" id="password" size="7" maxlength="255" />
	<p />
	New Password: <input type="password" name="newpassword" id="newpassword" size="7" maxlength="255" />
	<p />
	<input type="submit" value="Change" onClick="changepasswordhashing()" /><input type="reset" value="Reset" />
	</form>
</div>
