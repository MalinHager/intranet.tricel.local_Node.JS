  
    <script language="JavaScript">
    function showCalcLayer()
    {
        if(document.getElementById('calcLayer').style.display=='block')
        {
            document.getElementById('calcLayer').style.display='none';
        }
        else
        {
            document.getElementById('calcLayer').style.display='block';
        }
    }
    </script>
    
    <script language="JavaScript">
    function resetDisplay()
    {
        document.calc.display.value = "";
    }
    function updateDisplay(invalue)
    {
        document.calc.display.value = document.calc.display.value + invalue;
    }
    function calculate()
    {
        document.calc.display.value = eval(document.calc.display.value);
    }
    </script>

    <script language="JavaScript">
    function loadChat()
    {
        const xhttp = new XMLHttpRequest();

        setInterval(function()
        {
            xhttp.onload = function()
            {
                document.getElementById("chatnumber").innerHTML = this.responseText;
            }

            xhttp.open("GET", "http://localhost:3000/api/getchat", true);
            xhttp.send();
        }, 3000);
    }
    </script>

    <script language="JavaScript">
function showChatLayer() {
    var layer = document.getElementById('chatLayer');
    
    // Vi kollar om rutan är dold eller inte har något värde alls än
    if (layer.style.display === 'none' || layer.style.display === '') {
        layer.style.display = 'flex'; // Visa rutan
        refreshChatMessages();       // Hämta historiken
    } else {
        layer.style.display = 'none';  // Dölj rutan
    }
}
    </script>

    <script language="JavaScript">
    function submitChat() 
    {
        const msg = document.getElementById("chatmessage").value;
        const xhttp = new XMLHttpRequest();
    
        xhttp.onload = function() 
        {
            // När meddelandet är skickat, hämta alla meddelanden på nytt
            refreshChatMessages();
            document.getElementById("chatmessage").value = ""; // Töm textrutan
        }

        // Vi skickar som URL-encoded för att matcha din Express-backend
        xhttp.open("POST", "http://localhost:3000/api/chat", true);
        xhttp.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
        xhttp.send("chatmessage=" + encodeURIComponent(msg));
    }

    function refreshChatMessages() 
    {
        const xhttp = new XMLHttpRequest();
        xhttp.onload = function() 
        {
            const chatBox = document.getElementById("chatLayerMessages");
            chatBox.innerHTML = this.responseText;
        
            // Tvinga skrollen att hoppa längst ner så man ser senaste meddelandet
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        xhttp.open("GET", "http://localhost:3000/api/chat", true);
        xhttp.send();
    }

    function checkAccess() {
        // Hämta nivån från det dolda fältet vi skapat i HTML-filen
        var accessField = document.getElementById('userAccessLevel');
        var btn = document.getElementById('researchBtn');

        if (accessField && btn) {
            var level = accessField.value;

            // Om nivån är C, eller om värdet saknas, dölj knappen
            if (level === 'C' || level === '' || level === 'undefined') {
                btn.style.display = 'none';
            }
        }
    }

    // Kör kontrollen så fort sidan har laddats klart
    window.onload = function() {
        checkAccess();
    };
</script>
