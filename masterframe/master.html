<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    display: grid;
    /* Skapar två kolumner: en bred för video och en smalare för sensorer */
    grid-template-columns: 2fr 1fr; 
    gap: 15px;
    background-color: #171819; /* Tricell-mörkgrå */
    padding: 20px;
    font-family: Arial, sans-serif;
  }

  /* Vänster kolumn (Livestreams) */
  .video-column {
    display: grid;
    grid-template-rows: repeat(3, 200px); /* Tre rutor på höjden */
    gap: 10px;
  }

  /* Höger kolumn (Sensorer) */
  .sensor-column {
    display: grid;
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
  }

  .box {
    background-color: #f1f1f1;
    border: 2px solid #336699;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    color: #171819;
  }

  .sensor-box {
    background-color: #e0e0e0;
    border-left: 5px solid #ff0000; /* Röd detalj för sensorer */
  }
</style>
</head>
<body>

<h1 style="color: white; background: #000; padding: 10px;">TRICELL - REALTIME MONITORING</h1>


  <div class="master-monitor">
  <div>
    <h3>T-Veronica Lab</h3>
    <object type="text/html" data="http://t-veronica.tricell.local/livestream.html" width="410" height="315"></object>
  </div>

  <div>
    <h3>Uroboros Research</h3>
    <object type="text/html" data="http://uroboros.tricell.local/livestream.html" width="410" height="315"></object>
  </div>

  <div>
    <h3>Tyrant Containment</h3>
    <object type="text/html" data="http://tyrant.tricell.local/livestream.html" width="410" height="315"></object>
  </div>
  </div>

  <div class="sensor-column">
    <div class="box sensor-box">🌡️ TEMP: <span id="temp">22</span>°C</div>
    <div class="box sensor-box">💧 HUMIDITY: <span id="hum">45</span>%</div>
    <div class="box sensor-box">💡 LIGHT: <span id="light">LOW</span></div>
  </div>
</div>

</body>
</html>
